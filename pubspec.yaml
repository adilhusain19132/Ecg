name: ecg_pdf_editor
description: ECG Report PDF Editor - Edit patient details in ECG PDFs
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # PDF picking
  file_picker: ^6.1.1

  # PDF creation & editing
  pdf: ^3.10.7
  printing: ^5.11.1

  # File system
  path_provider: ^2.1.1

  # Open saved PDF
  open_file: ^3.3.2

  # Permissions (Android storage)
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
